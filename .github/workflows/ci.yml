name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer

jobs:
  macos-tests:
    name: macOS Swift Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Xcode Version
        run: xcodebuild -version && swift --version

      - name: Test SwiftSync package
        run: swift test -v

      - name: Test DemoBackend package
        working-directory: DemoBackend
        run: swift test -v

      - name: Test DemoCore package
        working-directory: DemoCore
        run: swift test -v
