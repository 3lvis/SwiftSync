name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer

jobs:
  swift-format-check:
    name: swift-format check
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Check formatting
        run: |
          swift format --in-place --recursive SwiftSync/Sources SwiftSync/Tests
          if ! git diff --exit-code; then
            echo "::error::Code is not formatted. Run: swift format --in-place --recursive SwiftSync/Sources SwiftSync/Tests (and commit)."
            exit 1
          fi

  macos-tests:
    name: macOS Swift Test (${{ matrix.package.name }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: SwiftSync
            path: .
          - name: DemoBackend
            path: DemoBackend
          - name: DemoCore
            path: DemoCore
    steps:
      - uses: actions/checkout@v5

      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved', 'DemoBackend/Package.resolved', 'DemoCore/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Xcode Version
        run: xcodebuild -version && swift --version

      - name: Test package
        working-directory: ${{ matrix.package.path }}
        run: swift test -v

  docc-build:
    name: DocC build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-spm-docc-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-docc-

      - name: Build documentation
        run: |
          set -o pipefail
          swift package --allow-writing-to-directory ./.docc-out \
            generate-documentation --target SwiftSync --output-path ./.docc-out 2>&1 | tee docc.log
          if grep -q "warning:" docc.log; then
            echo "::error::DocC emitted warnings (e.g. unresolved symbol links). Fix them and rebuild."
            exit 1
          fi
