name: CI

on:
  push:
  pull_request:

env:
  DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer

jobs:
  macos-tests:
    name: macOS Swift Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Xcode Version
        run: xcodebuild -version
      - name: Build
        run: swift build -v
      - name: Test (Swift Testing + XCTest)
        run: swift test -v

  ios-tests:
    name: iOS Simulator Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Test on iOS Simulator
        run: |
          xcodebuild \
            -scheme SwiftSync-Package \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipMacroValidation \
            test
