name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer

jobs:
  swift-format-check:
    name: swift-format check
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Check formatting
        run: |
          swift format --in-place --recursive SwiftSync/Sources SwiftSync/Tests
          if ! git diff --exit-code; then
            echo "::error::Code is not formatted. Run: swift format --in-place --recursive SwiftSync/Sources SwiftSync/Tests (and commit)."
            exit 1
          fi

  macos-tests:
    name: macOS Swift Test (${{ matrix.package.name }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: SwiftSync
            path: .
          - name: DemoBackend
            path: DemoBackend
          - name: DemoCore
            path: DemoCore
    steps:
      - uses: actions/checkout@v5

      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved', 'DemoBackend/Package.resolved', 'DemoCore/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Xcode Version
        run: xcodebuild -version && swift --version

      - name: Test package
        working-directory: ${{ matrix.package.path }}
        run: swift test -v

  warnings:
    name: Warnings gate (${{ matrix.package.name }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: SwiftSync
            path: .
          - name: DemoBackend
            path: DemoBackend
          - name: DemoCore
            path: DemoCore
    steps:
      - uses: actions/checkout@v5
      # No SPM cache on purpose: a fresh build recompiles everything so warnings are
      # actually re-emitted (an incremental build would skip unchanged files).
      - name: Build and fail on first-party warnings
        working-directory: ${{ matrix.package.path }}
        run: |
          set -o pipefail
          swift build --build-tests 2>&1 | tee build.log
          if grep -E "warning:" build.log | grep -vE "\.build/(checkouts|artifacts)"; then
            echo "::error::Build emitted warnings in first-party code (${{ matrix.package.name }}). Fix them (the lines above)."
            exit 1
          fi

  doc-links:
    name: Doc link check
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Check relative markdown links resolve
        run: python3 scripts/check-doc-links.py

  perf-regression:
    name: Perf regression gate
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-spm-perf-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-perf-

      # Runs a small, fast benchmark subset (memory store, 1000 rows) and fails if a median
      # exceeds the ceiling. Generous on purpose — a catastrophic/algorithmic-regression guard,
      # not precise perf tracking (CI hardware is shared and noisy). Local median is ~75ms.
      - name: Run benchmark subset with regression ceiling
        env:
          SWIFTSYNC_RUN_BENCHMARKS: "1"
          SWIFTSYNC_BENCHMARK_STORES: memory
          SWIFTSYNC_BENCHMARK_TIERS: "1000"
          SWIFTSYNC_BENCHMARK_MAX_MEDIAN_MS: "2000"
        run: |
          swift test \
            --filter FetchStrategyBenchmarkTests/testGlobalBatchSyncBenchmarks \
            --filter FetchStrategyBenchmarkTests/testSingleItemSyncBenchmarks

  core-coverage:
    name: Core coverage gate (SwiftSync)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # need the PR base for the patch diff + the no-decrease base build

      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-spm-cov-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-cov-

      - name: Xcode Version
        run: swift --version

      # `swift test --show-codecov-path` only prints the path — it does NOT re-run tests. Run coverage
      # for real first, then read the path, or the gate scores stale data.
      - name: Coverage (HEAD)
        run: |
          swift test --enable-code-coverage
          echo "HEAD_JSON=$(swift test --show-codecov-path)" >> "$GITHUB_ENV"

      - name: Evaluate core coverage (informational)
        run: python3 scripts/core_coverage.py evaluate --head "$HEAD_JSON"

      - name: Patch gate — new SwiftSync core lines must be covered
        if: github.event_name == 'pull_request'
        run: |
          python3 scripts/core_coverage.py patch \
            --head "$HEAD_JSON" --diff-base "origin/${{ github.base_ref }}...HEAD"

      - name: No-decrease gate — core coverage must not drop vs base
        if: github.event_name == 'pull_request'
        run: |
          cp scripts/core_coverage.py "$RUNNER_TEMP/cc.py"
          cp "$HEAD_JSON" "$RUNNER_TEMP/head.json"
          git checkout --force "origin/${{ github.base_ref }}"
          swift test --enable-code-coverage
          python3 "$RUNNER_TEMP/cc.py" compare \
            --head "$RUNNER_TEMP/head.json" --base "$(swift test --show-codecov-path)"
