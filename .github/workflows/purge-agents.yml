name: Purge .agents on main

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  purge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Delete .agents folder if present
        run: |
          set -euo pipefail
          if [ -d ".agents" ]; then
            rm -rf .agents
            echo "Deleted .agents/"
          else
            echo "No .agents/ folder found"
          fi

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          if git status --porcelain | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: purge .agents from main [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi
